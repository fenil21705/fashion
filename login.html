<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Luxe Fashion</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body style="background-color: #fff; display: flex; flex-direction: column; min-height: 100vh;">

    <div class="container" style="padding-top: 40px;">
        <div class="text-center mb-2">
            <a href="index.html" class="logo"
                style="font-size: 2rem; text-decoration: none; color: #000; font-family: var(--font-heading); font-weight: 700;">LUXE.</a>
        </div>

        <section class="section container" style="display: flex; justify-content: center; padding-top: 40px;">
            <div class="auth-box" style="width: 100%; max-width: 450px;">
                <h1 class="text-center mb-2"
                    style="font-family: var(--font-heading); font-size: 2rem; margin-bottom: 40px; font-weight: 400;">
                    Let's sign in</h1>

                <form id="login-form">
                    <div class="form-group mb-2" style="margin-bottom: 25px;">
                        <label class="form-label"
                            style="font-weight: 700; font-size: 0.95rem; display: block; margin-bottom: 8px;">Email*</label>
                        <input type="email" id="email" class="form-control" placeholder="Email" required
                            style="width: 100%; padding: 15px; border: 1px solid #ddd; height: 50px; font-size: 1rem; border-radius: 0;">
                    </div>

                    <div class="form-group mb-2" style="margin-bottom: 30px;">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <label class="form-label" style="font-weight: 700; font-size: 0.95rem;">Password*</label>
                            <a href="#"
                                style="text-decoration: underline; color: #000; font-size: 0.9rem; font-weight: 600;">Forget
                                password?</a>
                        </div>
                        <div style="position: relative;">
                            <input type="password" id="password" class="form-control" placeholder="........" required
                                style="width: 100%; padding: 15px; border: 1px solid #ddd; height: 50px; font-size: 1rem; border-radius: 0;">
                            <span id="toggle-password"
                                style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-weight: 600; font-size: 0.9rem;">Show</span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; background: #000; color: #fff; height: 55px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; font-size: 0.9rem; border: none; cursor: pointer;">Sign
                        In</button>
                </form>

                <div class="text-center mt-2" style="margin-top: 25px; font-size: 0.9rem;">
                    Don't have an account? <a href="register.html"
                        style="text-decoration: underline; font-weight: 600; color: #000;">Create one</a>
                </div>
            </div>
        </section>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Password Toggle Logic
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? 'Show' : 'Hide';
        });

        // Login Logic
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (email && password) {
                try {
                    const response = await App.fetch('auth.php?action=login', {
                        method: 'POST',
                        body: JSON.stringify({ email, password })
                    });

                    if (response.user) {
                        App.login(response.user);
                    } else {
                        alert(response.message || 'Login failed');
                    }
                } catch (err) {
                    alert('Login failed. Please check your credentials.');
                    console.error(err);
                }
            } else {
                alert('Please fill in all fields');
            }
        });
    </script>
</body>

</html>
