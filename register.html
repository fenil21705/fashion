<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Luxe Fashion</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body style="background-color: #fff; display: flex; flex-direction: column; min-height: 100vh;">

    <div class="container" style="padding-top: 40px;">
        <div class="text-center mb-2">
            <a href="index.html" class="logo"
                style="font-size: 2rem; text-decoration: none; color: #000; font-family: var(--font-heading); font-weight: 700;">LUXE.</a>
        </div>

        <section class="section container" style="display: flex; justify-content: center; padding-top: 20px;">
            <div class="auth-box" style="width: 100%; max-width: 450px;">
                <h1 class="text-center mb-2"
                    style="font-family: var(--font-heading); font-size: 2rem; margin-bottom: 30px; font-weight: 400;">
                    Create Account</h1>

                <form id="register-form">
                    <div class="form-group mb-2" style="margin-bottom: 20px;">
                        <label class="form-label"
                            style="font-weight: 700; font-size: 0.95rem; display: block; margin-bottom: 8px;">Full
                            Name*</label>
                        <input type="text" id="name" class="form-control" placeholder="Your Name" required
                            style="width: 100%; padding: 15px; border: 1px solid #ddd; height: 50px; font-size: 1rem; border-radius: 0;">
                    </div>

                    <div class="form-group mb-2" style="margin-bottom: 20px;">
                        <label class="form-label"
                            style="font-weight: 700; font-size: 0.95rem; display: block; margin-bottom: 8px;">Email*</label>
                        <input type="email" id="email" class="form-control" placeholder="Email" required
                            style="width: 100%; padding: 15px; border: 1px solid #ddd; height: 50px; font-size: 1rem; border-radius: 0;">
                    </div>

                    <div class="form-group mb-2" style="margin-bottom: 20px;">
                        <label class="form-label"
                            style="font-weight: 700; font-size: 0.95rem; display: block; margin-bottom: 8px;">Password*</label>
                        <div style="position: relative;">
                            <input type="password" id="password" class="form-control" placeholder="........" required
                                style="width: 100%; padding: 15px; border: 1px solid #ddd; height: 50px; font-size: 1rem; border-radius: 0;">
                            <span class="toggle-password" data-target="password"
                                style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-weight: 600; font-size: 0.9rem;">Show</span>
                        </div>
                    </div>

                    <div class="form-group mb-2" style="margin-bottom: 30px;">
                        <label class="form-label"
                            style="font-weight: 700; font-size: 0.95rem; display: block; margin-bottom: 8px;">Confirm
                            Password*</label>
                        <div style="position: relative;">
                            <input type="password" id="confirm-password" class="form-control" placeholder="........"
                                required
                                style="width: 100%; padding: 15px; border: 1px solid #ddd; height: 50px; font-size: 1rem; border-radius: 0;">
                            <span class="toggle-password" data-target="confirm-password"
                                style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-weight: 600; font-size: 0.9rem;">Show</span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; background: #000; color: #fff; height: 55px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; font-size: 0.9rem; border: none; cursor: pointer;">Register</button>
                </form>

                <div class="text-center mt-2" style="margin-top: 25px; font-size: 0.9rem;">
                    Already have an account? <a href="login.html"
                        style="text-decoration: underline; font-weight: 600; color: #000;">Sign in</a>
                </div>
            </div>
        </section>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Password Toggle Logic
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function () {
                const targetId = this.dataset.target;
                const input = document.getElementById(targetId);
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.textContent = type === 'password' ? 'Show' : 'Hide';
            });
        });

        // Register Logic
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            if (name && email && password) {
                try {
                    const response = await App.fetch('auth.php?action=register', {
                        method: 'POST',
                        body: JSON.stringify({ name, email, password })
                    });

                    if (response.message === 'User registered successfully') {
                        alert('Account created successfully! Please sign in.');
                        window.location.href = 'login.html';
                    } else {
                        alert(response.message || 'Registration failed');
                    }
                } catch (err) {
                    alert('Registration failed. Please try again.');
                    console.error(err);
                }
            } else {
                alert('Please fill in all fields');
            }
        });
    </script>
</body>

</html>
